name: Test kubeconfig method
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          cluster-type: generic
          method: kubeconfig
          kubeconfig: |
            apiVersion: v1
            kind: Config
            clusters:
            - cluster:
                server: https://localhost:6443
                insecure-skip-tls-verify: true
              name: test-cluster
            contexts:
            - context:
                cluster: test-cluster
                user: test-user
              name: test-context
            current-context: test-context
            users:
            - name: test-user
              user:
                token: fake-token
          context: test-context
      - name: Assert action ran (may fail due to no real cluster)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action executed with kubeconfig and context inputs"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
