name: Test kubeconfig method
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create minimal kubeconfig
        run: |
          cat <<'EOF' > /tmp/test-kubeconfig.yaml
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              server: https://127.0.0.1:6443
              insecure-skip-tls-verify: true
            name: test-cluster
          contexts:
          - context:
              cluster: test-cluster
              user: test-user
            name: test-context
          current-context: test-context
          users:
          - name: test-user
            user:
              token: fake-token
          EOF
      - id: action
        uses: .
        continue-on-error: true
        with:
          cluster-type: generic
          method: kubeconfig
          kubeconfig: |
            apiVersion: v1
            kind: Config
            clusters:
            - cluster:
                server: https://127.0.0.1:6443
                insecure-skip-tls-verify: true
              name: test-cluster
            contexts:
            - context:
                cluster: test-cluster
                user: test-user
              name: test-context
            current-context: test-context
            users:
            - name: test-user
              user:
                token: fake-token
          context: test-context
      - name: Assert action ran (inputs were accepted)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action may fail to connect to the cluster, but it should at least
          # process the inputs without an input validation error.
          # We verify the action was invoked (not skipped).
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action was invoked with kubeconfig and context inputs"
