name: Test kubeconfig method
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create minimal kubeconfig
        id: create-kubeconfig
        run: |
          KUBECONFIG_CONTENT=$(cat <<'EOF'
          apiVersion: v1
          clusters:
          - cluster:
              server: https://127.0.0.1:6443
              insecure-skip-tls-verify: true
            name: test-cluster
          contexts:
          - context:
              cluster: test-cluster
              user: test-user
            name: test-context
          current-context: test-context
          kind: Config
          preferences: {}
          users:
          - name: test-user
            user:
              token: fake-token
          EOF
          )
          echo "kubeconfig<<KUBECONFIG_EOF" >> $GITHUB_OUTPUT
          echo "$KUBECONFIG_CONTENT" >> $GITHUB_OUTPUT
          echo "KUBECONFIG_EOF" >> $GITHUB_OUTPUT
      - id: action
        uses: .
        with:
          cluster-type: generic
          method: kubeconfig
          kubeconfig: |
            apiVersion: v1
            clusters:
            - cluster:
                server: https://127.0.0.1:6443
                insecure-skip-tls-verify: true
              name: test-cluster
            contexts:
            - context:
                cluster: test-cluster
                user: test-user
              name: test-context
            current-context: test-context
            kind: Config
            preferences: {}
            users:
            - name: test-user
              user:
                token: fake-token
          context: test-context
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Action completed (may fail due to no real cluster, but inputs were accepted)"
          echo "PASS: inputs kubeconfig and context were provided"
