name: Test kubeconfig plaintext method
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER_TEMP: /tmp/runner-temp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare runner temp directory
        run: mkdir -p /tmp/runner-temp

      - name: Create a minimal kubeconfig and export it
        run: |
          printf '%s\n' \
            'apiVersion: v1' \
            'kind: Config' \
            'clusters:' \
            '- cluster:' \
            '    server: https://127.0.0.1:6443' \
            '    insecure-skip-tls-verify: true' \
            '  name: test-cluster' \
            'contexts:' \
            '- context:' \
            '    cluster: test-cluster' \
            '    user: test-user' \
            '  name: test-context' \
            'current-context: test-context' \
            'users:' \
            '- name: test-user' \
            '  user:' \
            '    token: fake-token-for-testing' \
            > /tmp/test-kubeconfig.yaml
          KUBECONFIG_CONTENT=$(cat /tmp/test-kubeconfig.yaml)
          printf 'KUBECONFIG_CONTENT<<EOF\n%s\nEOF\n' "$KUBECONFIG_CONTENT" >> $GITHUB_ENV

      - id: set-context
        uses: .
        with:
          cluster-type: generic
          method: kubeconfig
          kubeconfig: ${{ env.KUBECONFIG_CONTENT }}
          kubeconfig-encoding: plaintext
          context: test-context

      - name: Assert KUBECONFIG env var is set
        run: |
          echo "KUBECONFIG value: $KUBECONFIG"
          if [ -z "$KUBECONFIG" ]; then
            echo "FAIL: KUBECONFIG environment variable is not set"
            exit 1
          fi
          echo "PASS: KUBECONFIG is set to $KUBECONFIG"

      - name: Assert kubeconfig file exists
        run: |
          echo "Checking KUBECONFIG file at: $KUBECONFIG"
          if [ ! -f "$KUBECONFIG" ]; then
            echo "FAIL: kubeconfig file does not exist at $KUBECONFIG"
            exit 1
          fi
          echo "PASS: kubeconfig file exists"

      - name: Assert kubeconfig contains expected cluster
        run: |
          echo "Kubeconfig contents:"
          cat "$KUBECONFIG"
          if ! grep -q "test-cluster" "$KUBECONFIG"; then
            echo "FAIL: kubeconfig does not contain expected cluster 'test-cluster'"
            exit 1
          fi
          echo "PASS: kubeconfig contains expected cluster"
