name: Test arc cluster type
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER_TEMP: /tmp/runner-temp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare runner temp directory
        run: mkdir -p /tmp/runner-temp

      - id: set-context
        uses: .
        continue-on-error: true
        with:
          cluster-type: arc
          method: service-principal
          resource-group: my-resource-group
          cluster-name: my-arc-cluster
          token: fake-decoded-token-for-testing

      - name: Assert action was invoked with resource-group and cluster-name inputs
        run: |
          echo "Action outcome: ${{ steps.set-context.outcome }}"
          # The action may fail because Azure credentials are not configured,
          # but we verify the inputs were accepted (not rejected as missing).
          # A failure due to missing required input would show a different error.
          if [ "${{ steps.set-context.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action was invoked with resource-group and cluster-name inputs"
