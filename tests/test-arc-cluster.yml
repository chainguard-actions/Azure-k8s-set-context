name: Test arc cluster type
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          cluster-type: arc
          method: service-principal
          resource-group: my-resource-group
          cluster-name: my-arc-cluster
      - name: Assert action ran (may fail due to no real Azure/arc cluster)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action executed with resource-group and cluster-name inputs"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
