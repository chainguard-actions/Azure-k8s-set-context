name: Test service-account method
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER_TEMP: /tmp/runner-temp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare runner temp directory
        run: mkdir -p /tmp/runner-temp

      - name: Create a fake service account secret YAML
        run: |
          FAKE_TOKEN_B64=$(printf '%s' 'fake-token-for-testing' | base64 -w 0)
          FAKE_CERT_B64=$(printf '%s' 'fake-ca-cert-data' | base64 -w 0)
          printf '%s\n' \
            'apiVersion: v1' \
            'kind: Secret' \
            'metadata:' \
            '  name: test-sa-secret' \
            'type: kubernetes.io/service-account-token' \
            'data:' \
            "  token: ${FAKE_TOKEN_B64}" \
            "  ca.crt: ${FAKE_CERT_B64}" \
            > /tmp/sa-secret.yaml
          printf 'SA_SECRET<<EOF\n' >> $GITHUB_ENV
          cat /tmp/sa-secret.yaml >> $GITHUB_ENV
          printf 'EOF\n' >> $GITHUB_ENV

      - id: set-context
        uses: .
        with:
          cluster-type: generic
          method: service-account
          k8s-url: https://127.0.0.1:6443
          k8s-secret: ${{ env.SA_SECRET }}

      - name: Assert KUBECONFIG env var is set
        run: |
          echo "KUBECONFIG value: $KUBECONFIG"
          if [ -z "$KUBECONFIG" ]; then
            echo "FAIL: KUBECONFIG environment variable is not set"
            exit 1
          fi
          echo "PASS: KUBECONFIG is set to $KUBECONFIG"

      - name: Assert kubeconfig file exists and contains expected server URL
        run: |
          echo "Checking KUBECONFIG file at: $KUBECONFIG"
          if [ ! -f "$KUBECONFIG" ]; then
            echo "FAIL: kubeconfig file does not exist at $KUBECONFIG"
            exit 1
          fi
          echo "Kubeconfig contents:"
          cat "$KUBECONFIG"
          if ! grep -q "127.0.0.1:6443" "$KUBECONFIG"; then
            echo "FAIL: kubeconfig does not contain expected server URL"
            exit 1
          fi
          echo "PASS: kubeconfig file exists and contains expected server URL"
