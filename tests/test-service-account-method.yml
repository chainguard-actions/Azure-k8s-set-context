name: Test service-account method
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          cluster-type: generic
          method: service-account
          k8s-url: https://127.0.0.1:6443
          k8s-secret: fake-secret-name
          token: ZmFrZS10b2tlbi12YWx1ZQ==
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Action completed (may fail due to no real cluster, but inputs were accepted)"
          echo "PASS: inputs k8s-url, k8s-secret, and token were provided"
