name: Test service-account method
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          cluster-type: generic
          method: service-account
          k8s-url: https://localhost:6443
          k8s-secret: fake-secret-name
          token: fake-base64-decoded-token
      - name: Assert action ran (may fail due to no real cluster)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action executed with k8s-url, k8s-secret, and token inputs"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
