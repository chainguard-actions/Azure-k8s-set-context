name: Test service-account method
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          cluster-type: generic
          method: service-account
          k8s-url: https://127.0.0.1:6443
          k8s-secret: fake-secret-name
          token: ZmFrZS10b2tlbi12YWx1ZQ==
      - name: Assert action ran (inputs were accepted)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action may fail to connect to the cluster, but it should at least
          # process the inputs without an input validation error.
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action was invoked with k8s-url, k8s-secret, and token inputs"
