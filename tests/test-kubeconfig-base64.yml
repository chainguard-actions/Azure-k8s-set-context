name: Test kubeconfig base64 method
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER_TEMP: /tmp/runner-temp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare runner temp directory
        run: mkdir -p /tmp/runner-temp

      - name: Create and base64-encode a minimal kubeconfig
        run: |
          printf '%s\n' \
            'apiVersion: v1' \
            'kind: Config' \
            'clusters:' \
            '- cluster:' \
            '    server: https://127.0.0.1:6443' \
            '    insecure-skip-tls-verify: true' \
            '  name: base64-cluster' \
            'contexts:' \
            '- context:' \
            '    cluster: base64-cluster' \
            '    user: base64-user' \
            '  name: base64-context' \
            'current-context: base64-context' \
            'users:' \
            '- name: base64-user' \
            '  user:' \
            '    token: fake-token-base64-test' \
            > /tmp/test-kubeconfig-b64.yaml
          ENCODED=$(base64 -w 0 /tmp/test-kubeconfig-b64.yaml)
          echo "KUBECONFIG_B64=$ENCODED" >> $GITHUB_ENV

      - id: set-context
        uses: .
        with:
          cluster-type: generic
          method: kubeconfig
          kubeconfig: ${{ env.KUBECONFIG_B64 }}
          kubeconfig-encoding: base64

      - name: Assert KUBECONFIG env var is set
        run: |
          echo "KUBECONFIG value: $KUBECONFIG"
          if [ -z "$KUBECONFIG" ]; then
            echo "FAIL: KUBECONFIG environment variable is not set"
            exit 1
          fi
          echo "PASS: KUBECONFIG is set to $KUBECONFIG"

      - name: Assert kubeconfig file exists and contains expected cluster
        run: |
          echo "Checking KUBECONFIG file at: $KUBECONFIG"
          if [ ! -f "$KUBECONFIG" ]; then
            echo "FAIL: kubeconfig file does not exist at $KUBECONFIG"
            exit 1
          fi
          echo "Kubeconfig contents:"
          cat "$KUBECONFIG"
          if ! grep -q "base64-cluster" "$KUBECONFIG"; then
            echo "FAIL: kubeconfig does not contain expected cluster 'base64-cluster'"
            exit 1
          fi
          echo "PASS: kubeconfig file exists and contains expected cluster"
