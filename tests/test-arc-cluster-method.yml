name: Test arc cluster with service-principal method
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          cluster-type: arc
          method: service-principal
          resource-group: my-resource-group
          cluster-name: my-arc-cluster
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Action completed (may fail due to no real Azure credentials, but inputs were accepted)"
          echo "PASS: inputs resource-group and cluster-name were provided"
